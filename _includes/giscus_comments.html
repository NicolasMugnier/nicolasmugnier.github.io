<div id="giscus-container"></div>
<script>
(function() {
  var isDark = !document.documentElement.hasAttribute('data-theme');
  var script = document.createElement('script');
  script.src = 'https://giscus.app/client.js';
  script.dataset.repo = '{{ site.giscus.repo }}';
  script.dataset.repoId = '{{ site.giscus.repo_id }}';
  script.dataset.category = '{{ site.giscus.category }}';
  script.dataset.categoryId = '{{ site.giscus.category_id }}';
  script.dataset.mapping = 'pathname';
  script.dataset.strict = '0';
  script.dataset.reactionsEnabled = '1';
  script.dataset.emitMetadata = '0';
  script.dataset.inputPosition = 'bottom';
  script.dataset.theme = isDark ? 'dark_dimmed' : 'light';
  script.dataset.lang = 'fr';
  script.crossOrigin = 'anonymous';
  script.async = true;
  document.getElementById('giscus-container').appendChild(script);
})();
</script>
